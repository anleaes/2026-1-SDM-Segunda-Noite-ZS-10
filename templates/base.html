{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{% block title %}Sistema de Vacinas{% endblock title %}</title>
</head>
<body class="core_body">

  {% if user.is_authenticated %}
  <br />
  Voce está logado como: {{ user.get_full_name|default:user.username }}
  <br />
  <a href="{% url 'accounts:user_change_information' user.username %}"><button>Conta</button></a>
  <a href="{% url 'accounts:user_change_password' %}"><button>Trocar senha</button></a>
  <a href="{% url 'accounts:user_logout' %}"><button>Sair</button></a>
  <br />
  <br />
  {% endif %}

  {% block body %}{% endblock body %}

</body>
</html>
