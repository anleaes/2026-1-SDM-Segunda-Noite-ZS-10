{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Vacinas — Login</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <div class="login-container">
    <div class="login-box">
      <h1>💉 Sistema de Vacinas</h1>
      <p>Faça login para acessar o sistema</p>

      {% if form.errors %}
      <div class="login-error">Usuário ou senha inválidos.</div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <div class="login-field">
          <label for="id_username">Usuário</label>
          <input type="text" id="id_username" name="username" placeholder="Digite seu usuário" required>
        </div>

        <div class="login-field">
          <label for="id_password">Senha</label>
          <input type="password" id="id_password" name="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <div class="login-footer">
        Sistemas Distribuídos e Mobile — UniRitter 2026/1
      </div>
    </div>
  </div>

</body>
</html>
