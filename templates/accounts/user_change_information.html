{% extends 'base.html' %}
{% block title %}
    Alterar usuario - {{ block.super }}
{% endblock title %}
{% block body %}
<br />
<p>Alterar usuario</p>
<br />
<form action="" method="POST">
{% csrf_token %}
    <label>Primeiro nome</label>
    <br />
    {{ form.first_name }}
    <br />
    <br />
    <label>Sobrenome</label>
    <br />
    {{ form.last_name }}
    <br />
    <br />
    <label>E-mail</label>
    <br />
    {{ form.email }}
    <br />
    <br />
    <button type="submit">Salvar</button>
</form>
{% endblock body %}
